name: Build Android .so

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Extract project archive
        run: |
          tar -xzf transformer_gdextension_project.tar.gz
          rm transformer_gdextension_project.tar.gz

      - name: Setup Python and scons
        run: pip install scons

      - name: Download Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r25b-linux.zip
          unzip -q android-ndk-r25b-linux.zip -d /tmp
          rm android-ndk-r25b-linux.zip

      # 关键：同时创建两个符号链接，满足不同版本 godot-cpp 的查找
      - name: Setup NDK symlinks
        run: |
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo mkdir -p /usr/local/lib/android/sdk/ndk
          # godot-cpp 4.2.2 需要的默认路径
          sudo ln -s /tmp/android-ndk-r25b /usr/local/lib/android/sdk/ndk/23.2.8568313
          # 我们之前自定义 SConstruct 使用的路径（保留）
          sudo ln -s /tmp/android-ndk-r25b /usr/local/lib/android/sdk/ndk/28.1.13356709

      - name: Replace godot-cpp with 4.2.2
        run: |
          cd transformer_gdextension
          rm -rf godot-cpp-master
          git clone --depth 1 --branch godot-4.2.2-stable https://github.com/godotengine/godot-cpp.git godot-cpp-master

      - name: Generate godot-cpp bindings
        run: |
          cd transformer_gdextension/godot-cpp-master
          scons target=template_release generate_bindings=yes -j$(nproc)

      # 编译 godot-cpp，不再传递 ANDROID_NDK_ROOT，它会自动找到符号链接路径
      - name: Compile godot-cpp for Android
        run: |
          cd transformer_gdextension/godot-cpp-master
          scons platform=android target=template_release -j$(nproc)

      - name: Fix source code for Godot 4
        run: |
          cd transformer_gdextension/src
          python3 << 'PYEOF'
          import re

          with open('transformer_model.cpp', 'r') as f:
              content = f.read()

          if '#include <cstring>' not in content:
              content = '#include <cstring>\n' + content

          content = content.replace(
              'static PackedFloat32Array read_float32_array(FileAccess* file, int count) {',
              'static PackedFloat32Array read_float32_array(const Ref<FileAccess>& file, int count) {'
          )
          content = content.replace('if (!file) return false;', 'if (file.is_null()) return false;')

          content = re.sub(
              r'PackedFloat32Array token_vec\(x\.ptr\(\) \+ i \* hidden_size, x\.ptr\(\) \+ \(i \+ 1\) \* hidden_size\);',
              'PackedFloat32Array token_vec;\n            token_vec.resize(hidden_size);\n            memcpy(token_vec.ptrw(), x.ptr() + i * hidden_size, hidden_size * sizeof(float));',
              content
          )
          content = re.sub(
              r'PackedFloat32Array k_cur\(K_new\.ptr\(\) \+ h_start, K_new\.ptr\(\) \+ h_start \+ head_dim\);',
              'PackedFloat32Array k_cur;\n            k_cur.resize(head_dim);\n            memcpy(k_cur.ptrw(), K_new.ptr() + h_start, head_dim * sizeof(float));',
              content
          )
          content = re.sub(
              r'PackedFloat32Array v_cur\(V_new\.ptr\(\) \+ h_start, V_new\.ptr\(\) \+ h_start \+ head_dim\);',
              'PackedFloat32Array v_cur;\n            v_cur.resize(head_dim);\n            memcpy(v_cur.ptrw(), V_new.ptr() + h_start, head_dim * sizeof(float));',
              content
          )
          content = re.sub(
              r'PackedFloat32Array tok\(x\.ptr\(\) \+ i \* input_size, x\.ptr\(\) \+ \(i \+ 1\) \* input_size\);',
              'PackedFloat32Array tok;\n            tok.resize(input_size);\n            memcpy(tok.ptrw(), x.ptr() + i * input_size, input_size * sizeof(float));',
              content
          )

          content = content.replace('cached_positions[layer][h].ptr()', 'cached_positions[layer][h].data()')

          with open('transformer_model.cpp', 'w') as f:
              f.write(content)
          PYEOF

      - name: Fix SConstruct and prepare library
        run: |
          cd transformer_gdextension
          cat > SConstruct << 'EOF'
          #!/usr/bin/env python
          import os
          import subprocess

          libname = "godot_onnx"

          env = Environment()
          ndk_root = os.environ.get('ANDROID_NDK_ROOT', '/tmp/android-ndk-r25b')
          env['CC'] = os.environ.get('CC', ndk_root + '/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang')
          env['CXX'] = os.environ.get('CXX', ndk_root + '/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang++')
          env['LINK'] = env['CXX']
          env.Append(CPPPATH=[ndk_root + '/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/include'])
          env.Append(LIBPATH=[ndk_root + '/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/21'])
          env.Append(LINKFLAGS=['-fuse-ld=lld'])

          env['godot_cpp_dir'] = 'godot-cpp-master'

          env.Append(CCFLAGS=['-fPIC', '-O3', '-std=c++17'])
          env.Append(LINKFLAGS=['-fPIC'])

          env.Append(CPPPATH=[env['godot_cpp_dir'] + '/include/',
                              env['godot_cpp_dir'] + '/include/core/',
                              env['godot_cpp_dir'] + '/gen/include/'])

          env.Append(LIBPATH=[env['godot_cpp_dir'] + '/bin/'])
          env.Append(LIBS=['godot-cpp'])

          sources = Glob('src/*.cpp')

          library = env.SharedLibrary(
              target='bin/' + libname,
              source=sources
          )

          Default(library)
          EOF
          cd godot-cpp-master/bin
          ln -sf libgodot-cpp.android.template_release.arm64.a libgodot-cpp.a

      - name: Compile GDExtension
        env:
          ANDROID_NDK_ROOT: /tmp/android-ndk-r25b
        run: |
          cd transformer_gdextension
          scons -j$(nproc)
          mkdir -p bin/android
          cp bin/libgodot_onnx.so bin/android/libgodot_onnx.android.template_release.arm64.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libgodot_onnx-android-arm64
          path: transformer_gdextension/bin/android/libgodot_onnx.android.template_release.arm64.so
